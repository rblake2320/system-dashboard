# system-dashboard — example config
# Copy to config.yaml and customize. config.yaml is gitignored.

dashboard:
  port: 8099
  host: "127.0.0.1"
  refresh_interval_seconds: 10   # how often the browser polls

daemon:
  enabled: true
  interval_seconds: 30           # how often background scan runs

llm:
  provider: "ollama"             # ollama | openai | anthropic | none
  model: "gemma3:latest"         # model name for your provider
  host: "http://localhost:11434" # ollama only
  api_key: ""                    # openai / anthropic — or set env OPENAI_API_KEY
  timeout_seconds: 60

# Processes to track. Add any exe name you care about.
processes:
  tracked:
    - name: "claude.exe"
      label: "Claude Code"
      warn_if_count_exceeds: 6
    - name: "codex.exe"
      label: "Codex (OpenAI)"
      warn: true
      warn_reason: "Runs autonomously without approval"
    - name: "node.exe"
      label: "Node / MCP Servers"
    - name: "python.exe"
      label: "Python"
    - name: "pwsh.exe"
      label: "PowerShell"
    - name: "cmd.exe"
      label: "CMD"
    - name: "bash.exe"
      label: "Bash"
    # Add any exe you want to track:
    # - name: "my-daemon.exe"
    #   label: "My Daemon"
    #   warn_if_count_exceeds: 1

# Ports to monitor. Add any you care about.
services:
  # Allowlist for NSSM/sc.exe service restarts.  When non-empty, only these
  # service names can be restarted via the service_fixer.  Leave empty ([]) to
  # allow any name (not recommended on exposed installs).
  allowed_service_names: []
  # Example:
  # allowed_service_names:
  #   - "MemoryWeb-API"
  #   - "MemoryWeb-Celery"
  ports:
    8099: "This Dashboard"
    8100: "MemoryWeb API"
    5432: "PostgreSQL"
    5433: "PostgreSQL (alt)"
    6379: "Redis"
    4222: "NATS"
    8080: "HTTP alt"
    3000: "Dev server"
    3001: "Dev server / Playwright"
    11434: "Ollama"
    # Add more:
    # 8888: "JupyterLab"
    # 9090: "Prometheus"

# Storage: which drives/paths to show.
storage:
  drives: ["C", "D"]             # Windows drive letters
  warn_free_gb_below: 10.0       # warn when free space < this
  failing_drives: []             # drives flagged as hardware-failing, e.g. ["D"]

# Projects to track on the Projects tab.
# path supports ~ for home directory.
projects: []
# Example:
# projects:
#   - name: "My App"
#     path: "~/my-app"
#   - name: "API Server"
#     path: "~/projects/api"

# Auth: protect mutating endpoints (kill, fix, diagnose).
# Default is disabled — safe for localhost-only use.
# Enable if you expose the dashboard to a LAN or tunnel.
# WARNING: when auth.enabled is true, tokens in query strings appear in access
# logs.  The dashboard mitigates this by routing SSE through /api/fix/ticket
# (short-lived ticket exchange) so the main token never appears in the SSE URL.
auth:
  enabled: false  # set to true to require X-Dashboard-Token header
  token: ""       # leave empty to auto-generate a token on each server restart

security:
  allow_kill_any_pid: false  # if false, only tracked processes can be killed

# External IPs to name in the Network panel.
known_ips: {}
# Example:
# known_ips:
#   "192.168.1.50": "Home NAS"
#   "10.0.0.2": "GPU Server"

# MemoryWeb knowledge-base health monitor.
memoryweb:
  url: "http://localhost:8100"     # local MemoryWeb API (NSSM service)
  # fallback: "https://memoryweb.ultrarag.app"

# BPC/TSK governance panel.
# BPC events come from the bpc_audit PostgreSQL table.
# TSK anomaly state comes from the TSK demo server at localhost:3200.
governance:
  # PostgreSQL DSN for the BPC audit table.
  # Leave empty to disable BPC (panel shows "not configured").
  bpc_pg_dsn: ""
  # Example (Windows PG on port 5434):
  # bpc_pg_dsn: "host=localhost port=5434 dbname=bpc user=postgres password=secret"

  # TSK demo server base URL (default: localhost:3200)
  tsk_url: "http://localhost:3200"

  # Path to TSK analytics NDJSON event log (relative or absolute)
  tsk_ndjson: ""
  # Example:
  # tsk_ndjson: "C:/Users/techai/tsk-protocol/demo/analytics.ndjson"

# Agent mesh node URLs.
mesh:
  army_url: "http://192.168.12.132:8500"   # AI Army on Spark-1
  hub_url: "http://192.168.12.132:8765"    # Agent Hub on Spark-1
  agentd_url: "http://localhost:8089"      # agent-status daemon (local)
